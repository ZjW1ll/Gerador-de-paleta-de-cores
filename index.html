<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de paleta</title>

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"/>
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 class="navbar-title">Gerador de paleta de cor</h1>
            <button class="btn-page-theme" id="btn-page-theme"><i class="fa-solid fa-moon"></i></button>
        </nav>
    </header>
    
    <main>
        <div class="palette">
            <div class="card" id="card1">
                <p class="hex" id="hex1">#AAAAAA</p>
            </div>
    
            <div class="card" id="card2">
                <p class="hex" id="hex2">#AAAAAA</p>
            </div>
    
            <div class="card" id="card3">
                <p class="hex" id="hex3">#AAAAAA</p>
            </div>
    
            <div class="card" id="card4">
                <p class="hex" id="hex4">#AAAAAA</p>
            </div>
    
            <div class="card" id="card5">
                <p class="hex" id="hex5">#AAAAAA</p>
            </div>
    
            <div class="card" id="card6">
                <p class="hex" id="hex6">#AAAAAA</p>
            </div>
        </div>
        <button class="btn-palette-generator" id="btn-palette-generator">Gerar paleta</button>
    </main>

    <footer>
        <div class="contact">
            <a href="https://github.com/ZjW1ll"><i class="fa-brands fa-github"></i></a>
            <a href="https://www.instagram.com/_zjwill/"><i class="fa-brands fa-instagram"></i></a>
        </div>
    </footer>
</body>
</html>
